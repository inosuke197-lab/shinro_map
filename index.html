.sok{background:#e8f8f0;color:#00a86b;font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;}
.sng{background:#f0f0f0;color:#aaa;font-size:9px;font-weight:700;padding:1px 4px;border-radius:2px;}
.card{background:var(--white);border-radius:8px;margin-bottom:8px;padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}

.card-body{flex:1;min-width:0;}
.card-name{font-size:13px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.cat-tag{font-size:9px;color:#999;background:#f0f0f0;padding:1px 5px;border-radius:3px;font-weight:700;}
.card-sub{font-size:10px;color:var(--gray);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-note{font-size:10px;color:#d04000;margin-top:2px;}

.time-detail{font-size:9px;color:#bbb;margin-top:2px;line-height:1.5;}
.count-line{font-size:11px;color:#999;margin-bottom:8px;}
.empty{text-align:center;color:#aaa;font-size:13px;padding:32px 0;}
.rank-def{font-size:10px;color:#aaa;padding:4px 0 8px;}

 "gakubu": "生命環境学部（実習施設）", "ekimade": "", "ekikara_text": "徒歩40分", "ekikara_n": 0, "total": "", "transfer": "", "rank": "", "status": "要確認", "bikou": "実習施設。タクシー利用推奨", "category": "国公立"}, {"id": "KIT_MAT", "daigaku": "京都工芸繊維大学", "campus": "松ヶ崎", "fields": ["SCI", "ARCH"], "gakubu": "工芸科学部", "ekimade": "", "ekikara_text": "徒歩8分", "ekikara_n": 0, "total": "", "transfer": "", "rank": "", "status": "要確認", "bikou": "", "category": "国公立"}, {"id": "KBU_ROK", "daigaku": "神戸大学", "campus": "六甲台", "fields": ["SCI", "BUS", "LAW", "EDU", "INFO", "ARCH", "INTL", "AGRI", "HUM"], "gakubu": "文学部,発達科学部,法学部,経済学部,経営学部,理学部,工学部,農学部,国際文化学部,システム情報学部", "ekimade": "", "ekikara_text": "徒歩15〜25分（急坂）", "ekikara_n": 0, "total": "", "transfer": "", "rank": "", "status": "要確認", "bikou": "バス利用で阪急六甲から約6〜7分。坂が急で徒歩はきつい", "category": "国公立"}, {"id": "SU_HIK", "daigaku": "滋賀大学", "campus": "彦根", "fields": ["BUS", "INFO"], "gakubu": "経済学部,データサイエンス学部", "ekimade": "", "ekikara_text": "バス10分または徒歩25分", "ekikara_n": 0, "total": "", "transfer": "", "rank": "", "status": "要確認", "bikou": "直行バスは平日のみ・100円", "category": "国公立"}, {"id": "SPU_HIK", "daigaku": "滋賀県立大学", "campus": "彦根", "fields": ["MED", "SCI", "ARCH", "HUM"], "gakubu": "環境科学部,工学部,人間文化学部,人間看護学部", "ekimade": "", "ekikara_text": "バス", "ekikara_n": 0, "total": "", "transfer": "", "rank": "", "status": "要確認", "bikou": "", "category": "国公立"}];
const COUNTS={"INFO": 11, "SCI": 20, "ARCH": 11, "AGRI": 11, "MED": 11, "BUS": 18, "LAW": 18, "EDU": 8, "INTL": 13, "HUM": 19, "ALL": 39};
const TABS=[
  {c:'ALL',l:'📋 全体'},{c:'INFO',l:'💻 情報'},{c:'SCI',l:'⚗️ 理工'},
  {c:'ARCH',l:'🏛 建築'},{c:'AGRI',l:'🌱 農学'},{c:'MED',l:'🏥 医療'},
  {c:'BUS',l:'📈 経済経営'},{c:'LAW',l:'⚖️ 法政治'},
  {c:'EDU',l:'📚 教育心理'},{c:'INTL',l:'🌏 国際外語'},{c:'HUM',l:'📖 人文社会'},
];
const FILTERS=['すべて','国公立','関関同立','産近甲龍','その他'];
let tab='ALL',filter='すべて';

function init(){
  const tabEl=document.getElementById('tabs');
  TABS.forEach(t=>{
    const cnt=COUNTS[t.c]||0;
    const el=document.createElement('div');
    el.className='tab'+(t.c===tab?' active':'');
    el.innerHTML=t.l+`<span class="tab-cnt">(${cnt})</span>`;
    el.onclick=()=>{tab=t.c;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();};
    tabEl.appendChild(el);
  });
  const fEl=document.getElementById('filters');
  FILTERS.forEach(f=>{
    const el=document.createElement('button');
    el.className='filter-btn'+(f===filter?' active':'');
    el.textContent=f;
    el.onclick=()=>{filter=f;document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();};
    fEl.appendChild(el);
  });
  render();
}

function render(){
  let list=tab==='ALL'?[...DATA]:DATA.filter(d=>d.fields.includes(tab));
  if(filter!=='すべて') list=list.filter(d=>d.category===filter);
  list.sort((a,b)=>{
    const at=typeof a.total==='number'?a.total:999;
    const bt=typeof b.total==='number'?b.total:999;
    return at-bt;
  });
  document.getElementById('count-line').textContent=list.length+' キャンパス表示中';
  const el=document.getElementById('cards');
  if(!list.length){el.innerHTML='<div class="empty">該当なし</div>';return;}
  el.innerHTML=list.map(d=>{
    const rc=d.rank?'r'+d.rank:'rU';
    const sc=d.status==='確認済'?'sok':'sng';
    const sText=d.status==='確認済'?'確認済':'未確認';
    let timeHtml,detailHtml='';
    if(typeof d.total==='number'){
      timeHtml=`<div class="time-num">${d.total}</div><div class="time-unit">分</div>`;
      const parts=[];
      if(d.ekimade&&d.ekimade>0) parts.push(`電車${d.ekimade}分`);
      if(d.ekikara_text&&d.ekikara_text!=='要確認'&&d.ekikara_text!=='') parts.push(d.ekikara_text);
      if(d.transfer!==''&&d.transfer!==null&&d.transfer!=='要確認') parts.push(`乗換${d.transfer}回`);
      if(parts.length) detailHtml=`<div class="time-detail">${parts.join('<br>')}</div>`;
    }else{
      timeHtml=`<div class="time-num unk">未確認</div>`;
      if(d.ekikara_text&&d.ekikara_text!=='要確認'&&d.ekikara_text!=='')
        detailHtml=`<div class="time-detail">${d.ekikara_text}</div>`;
    }
    const note=d.bikou?`<div class="card-note">${d.bikou}</div>`:'';
    const gText=d.gakubu.replace(/,/g,'・');
    const gShort=gText.length>55?gText.substring(0,55)+'…':gText;
    const catTag=`<span class="cat-tag">${d.category}</span>`;
    return `<div class="card ${rc}">
      <div class="badge">${d.rank||'?'}</div>
      <div class="card-body">
        <div class="card-name">${d.daigaku} ${d.campus}<span class="${sc}">${sText}</span>${catTag}</div>
        <div class="card-sub">${gShort}</div>${note}
      </div>
      <div class="time-block">${timeHtml}${detailHtml}</div>
    </div>`;
  }).join('');
}
init();
</script>
